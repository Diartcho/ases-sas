<section class="carousel-section">
  <div class="carousel-bg-shape"></div>

  @for (slide of slides; track slide.image; let i = $index) {
    <div class="carousel-slide" [class.active]="i === current">
      <div class="carousel-content">
        <div class="carousel-text">
          <h2 class="carousel-title">{{ slide.title }}</h2>
          <p class="carousel-subtitle">{{ slide.subtitle }}</p>
          <button class="carousel-cta" (click)="scrollTo(slide.link)">
            {{ slide.cta }}
          </button>
        </div>
        <div class="carousel-image-wrap">
          <img [src]="slide.image" [alt]="slide.title" class="carousel-img">
        </div>
      </div>
    </div>
  }

  <div class="carousel-nav">
    @for (slide of slides; track slide.image; let i = $index) {
      <button class="dot" [class.active]="i === current" (click)="goTo(i)"></button>
    }
  </div>
</section>
