<section class="benefits">
  <div class="container">
    <div class="benefits-header">
      <h2>¿Por qué elegir <span>ACES</span>?</h2>
      <p>Brindamos soluciones financieras con ventajas reales que hacen la diferencia en tu vida</p>
    </div>

    <div class="benefits-carousel"
         (touchstart)="onTouchStart($event)"
         (touchend)="onTouchEnd($event)">
      @for (benefit of benefits; track benefit.title; let i = $index) {
        <div class="benefit-slide"
             [class.slide-center]="i === current"
             [class.slide-left]="i === leftIdx"
             [class.slide-right]="i === rightIdx"
             [class.slide-hidden]="i !== current && i !== leftIdx && i !== rightIdx"
             (click)="i === leftIdx ? prev() : i === rightIdx ? next() : null">
          <img [src]="benefit.image" [alt]="benefit.title" class="benefit-img" loading="lazy" decoding="async">
          <div class="benefit-overlay">
            <h3>{{ benefit.title }}</h3>
            <p>{{ benefit.description }}</p>
          </div>
        </div>
      }

      <button class="arrow-btn arrow-prev" (click)="prev()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="arrow-btn arrow-next" (click)="next()">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="benefits-dots">
        @for (benefit of benefits; track benefit.title; let i = $index) {
          <button class="dot" [class.active]="i === current" (click)="goTo(i)"></button>
        }
      </div>
    </div>

  </div>
</section>
